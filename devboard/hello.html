<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>devBoard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #4c1d95, #7c3aed, #c084fc);
      color: white;
    }

    .card {
      text-align: center;
      padding: 3rem;
      max-width: 600px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
    }

    h1 {
      font-size: 3.2rem;
      margin-bottom: .8rem;
    }

    p {
      font-size: 1.1rem;
      opacity: .9;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    button {
      padding: .9rem 1.8rem;
      border: none;
      border-radius: 10px;
      background: white;
      color: #6d28d9;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: .25s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0,0,0,.2);
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>devBoard</h1>
    <p>
      Organize tasks, track progress, and ship projects faster.
      A clean task tracker built for developers.
    </p>
    <button>Get Started →</button>
  </div>

</body>
</html>
